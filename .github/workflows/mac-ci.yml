name: macOS CI

on:
  push:
    branches: [main]
    paths:
      - 'mac/**'
      - '.github/workflows/mac-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mac/**'
      - '.github/workflows/mac-ci.yml'

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: mac
        run: xcodegen generate

      - name: Build
        working-directory: mac
        run: xcodebuild build -scheme ParakeetFlow -configuration Debug -quiet

      - name: Test
        working-directory: mac
        run: xcodebuild test -scheme ParakeetFlow -configuration Debug -quiet
