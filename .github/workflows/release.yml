name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: mac/DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('mac/Package.swift', 'mac/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: mac
        run: xcodegen generate

      - name: Build release
        working-directory: mac
        run: >
          xcodebuild build -scheme ParakeetFlow -configuration Release
          -clonedSourcePackagesDirPath DerivedData/SourcePackages
          -derivedDataPath build
          -quiet

      - name: Run tests
        working-directory: mac
        run: >
          xcodebuild test -scheme ParakeetFlow -configuration Debug
          -clonedSourcePackagesDirPath DerivedData/SourcePackages
          -quiet

      - name: Create DMG
        run: |
          APP_PATH="mac/build/Build/Products/Release/ParakeetFlow.app"
          DMG_NAME="ParakeetFlow-${GITHUB_REF_NAME}.dmg"

          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create -volname "ParakeetFlow" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: ${{ env.DMG_NAME }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease -x lintVitalRelease

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  publish:
    needs: [build-mac, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg

      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: android-apk

      - name: Rename APK
        run: mv app-release.apk ParakeetFlow-${GITHUB_REF_NAME}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ParakeetFlow-*.dmg
            ParakeetFlow-*.apk
          generate_release_notes: true
