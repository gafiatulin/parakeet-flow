name: ParakeetFlow
options:
  bundleIdPrefix: com.github.gafiatulin
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  fileTypes:
    icon:
      file: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    branch: main

targets:
  ParakeetFlow:
    type: application
    platform: macOS
    sources:
      - path: Sources/ParakeetFlow
        excludes:
          - Resources/Info.plist
      - path: AppIcon.icon
        buildPhase: resources
    dependencies:
      - package: FluidAudio
      - package: mlx-swift-lm
        product: MLXLLM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.gafiatulin.ParakeetFlow
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Sources/ParakeetFlow/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: ParakeetFlow.entitlements
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: true
        SWIFT_VERSION: "6.2"
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        DEAD_CODE_STRIPPING: true
        ENABLE_USER_SCRIPT_SANDBOXING: true
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: ParakeetFlow.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true

  ParakeetFlowTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ParakeetFlowTests
    dependencies:
      - target: ParakeetFlow
    settings:
      base:
        SWIFT_VERSION: "6.2"
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ParakeetFlow.app/Contents/MacOS/ParakeetFlow"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ParakeetFlow:
    build:
      targets:
        ParakeetFlow: all
        ParakeetFlowTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ParakeetFlowTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
